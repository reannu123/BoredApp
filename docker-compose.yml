# Umbrella stack: client + API + auth + MongoDB. From the repo root:
#   cp .env.example .env   # (optional; sane dev defaults exist below)
#   docker compose up --build
# Then open http://localhost:3000
name: boredapp

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: ./server
    command: node server.js
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:-mongodb://mongo:27017/boredapp}
      PORT: 5000
      # Dev-only defaults so the stack runs with zero config. Override in
      # production (see .env.example); these are not baked into the image.
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev_access_secret_change_me}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_me}
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      - mongo

  auth:
    build:
      context: ./server
    command: node auth/authServer.js
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:-mongodb://mongo:27017/boredapp}
      PORT_AUTH: 5001
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev_access_secret_change_me}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_me}
    ports:
      - "${AUTH_PORT:-5001}:5001"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        # Browser-facing URLs, baked into the static bundle at build time.
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
        REACT_APP_AUTH_URL: ${REACT_APP_AUTH_URL:-http://localhost:5001/auth}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:80"
    depends_on:
      - api
      - auth

volumes:
  mongo-data:
