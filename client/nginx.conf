server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: unknown paths fall back to index.html so React Router
    # can handle client-side routing (e.g. /login, /settings).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
