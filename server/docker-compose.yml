# Standalone backend: API + auth servers + MongoDB (no client). Useful for
# testing or deploying the server on its own. From the server/ directory:
#   docker compose up --build
# Health checks: http://localhost:5000/health and http://localhost:5001/health
name: boredapp-server

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
    command: node server.js
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:-mongodb://mongo:27017/boredapp}
      PORT: 5000
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev_access_secret_change_me}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_me}
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      - mongo

  auth:
    build:
      context: .
    command: node auth/authServer.js
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:-mongodb://mongo:27017/boredapp}
      PORT_AUTH: 5001
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev_access_secret_change_me}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_me}
    ports:
      - "${AUTH_PORT:-5001}:5001"
    depends_on:
      - mongo

volumes:
  mongo-data:
